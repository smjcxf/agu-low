<script>
var currentTab = 'list';
var historyData = {};
var currentDate = '';

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('dateSelector').max = today;
  document.getElementById('dateSelector').value = today;
  currentDate = today;

  // 优先使用嵌入数据，如果为null则从json文件加载
  if (EMBEDDED_HISTORY_DATA && Object.keys(EMBEDDED_HISTORY_DATA).length > 0) {
    historyData = EMBEDDED_HISTORY_DATA;
    updateCurrentTab();
    updateStats();
    document.getElementById('updateTime').textContent = '最后更新：嵌入数据';
  } else {
    loadData();
  }
});

// 加载数据
async function loadData() {
  var selectedDate = document.getElementById('dateSelector').value;
  if (!selectedDate) return;
  currentDate = selectedDate;

  try {
    var data;
    var resp = await fetch('data/triple_resonance_history.json?_=' + Date.now());
    data = await resp.json();
    historyData = data;
    updateCurrentTab();
    updateStats();
    document.getElementById('updateTime').textContent = '最后更新：' + new Date().toLocaleString('zh-CN');
  } catch (e) {
    console.error('加载外部数据失败:', e);
    // 尝试使用嵌入数据
    if (EMBEDDED_HISTORY_DATA && Object.keys(EMBEDDED_HISTORY_DATA).length > 0) {
      historyData = EMBEDDED_HISTORY_DATA;
      updateCurrentTab();
      updateStats();
      document.getElementById('updateTime').textContent = '最后更新：嵌入数据（加载外部失败）';
    } else {
      var emptyState = document.getElementById('emptyList');
      if (emptyState) {
        emptyState.innerHTML = '<div class="icon">⚠️</div><div class="text">加载数据失败</div>';
        emptyState.style.display = 'block';
      }
      document.getElementById('stockTable').style.display = 'none';
    }
  }
}

// 更新当前标签页
function updateCurrentTab() {
  if (currentTab === 'list') {
    renderList();
  } else if (currentTab === 'timeline') {
    renderTimeline();
  } else if (currentTab === 'calendar') {
    renderCalendar();
  }
}

// 渲染列表
function renderList() {
  var data = historyData[currentDate] || [];
  var tbody = document.getElementById('stockTableBody');
  var emptyState = document.getElementById('emptyList');

  if (data.length === 0) {
    tbody.innerHTML = '';
    document.getElementById('stockTable').style.display = 'none';
    emptyState.style.display = 'block';
    return;
  }

  document.getElementById('stockTable').style.display = 'table';
  emptyState.style.display = 'none';

  var html = '';
  data.forEach(function(stock) {
    var jinzuan = stock['金钻_起涨'] || stock['金钻_黄柱'];
    var signals = [stock['缠论买_日K'], jinzuan, stock['四量图_机构变红'], stock['上涨趋势']];
    var signalCount = signals.filter(Boolean).length;
    html += '<tr>';
    html += '<td><strong>' + stock.code + '</strong></td>';
    html += '<td>' + stock.name + '</td>';
    html += '<td>¥' + (stock.close || '-') + '</td>';
    html += '<td style="color:' + (stock.pct_chg >= 0 ? '#c62828' : '#2e7d32') + ';">' + (stock.pct_chg >= 0 ? '+' : '') + (stock.pct_chg || '-') + '%</td>';
    html += '<td><span class="badge ' + (stock['缠论买_日K'] ? 'badge-signal' : '') + '">' + (stock['缠论买_日K'] ? '✓' : '✗') + '</span></td>';
    html += '<td><span class="badge ' + (jinzuan ? 'badge-signal' : '') + '">' + (jinzuan ? '✓' : '✗') + '</span></td>';
    html += '<td><span class="badge ' + (stock['四量图_机构变红'] ? 'badge-signal' : '') + '">' + (stock['四量图_机构变红'] ? '✓' : '✗') + '</span></td>';
    html += '<td><span class="badge ' + (stock['上涨趋势'] ? 'badge-signal' : '') + '">' + (stock['上涨趋势'] ? '✓' : '✗') + '</span></td>';
    html += '<td><strong>' + signalCount + '/4</strong></td>';
    html += '<td>' + (stock.duration_days || '-') + '天</td>';
    html += '<td>' + (stock.enter_date || '-') + '</td>';
    html += '</tr>';
  });

  tbody.innerHTML = html;
  document.getElementById('listTitle').textContent = currentDate + ' 三线共振股票列表（' + data.length + '只）';
}

// 计算股票评分
function calcStockScore(s) {
  var signalCount = s.signal_count || 0;
  var pctChg = s.pct_chg || 0;
  var pctChg20d = s.pct_chg_20d || 0;
  return (signalCount * 3 + pctChg * 0.5 + pctChg20d * 0.2).toFixed(1);
}

// 时间轴点击：跳转到股票列表并选中该日期
function clickTimelineDate(date) {
  document.getElementById('dateSelector').value = date;
  currentDate = date;
  // 切换到列表Tab
  switchTab('list', {target: document.querySelector('.tab')});
  renderList();
  updateStats();
}

// 渲染时间轴
function renderTimeline() {
  var timelineContent = document.getElementById('timelineContent');
  var emptyState = document.getElementById('emptyTimeline');

  var allDates = Object.keys(historyData).sort();
  var todayStr = new Date().toISOString().split('T')[0];
  var todayIdx = allDates.indexOf(todayStr);
  var dates = [];
  if (todayIdx >= 0) {
    dates.push(allDates.splice(todayIdx, 1)[0]);
  }
  dates = dates.concat(allDates.reverse()).slice(0, 31);

  if (dates.length === 0) {
    timelineContent.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }

  emptyState.style.display = 'none';

  var html = '';
  var prevStocks = [];

  dates.forEach(function(date) {
    var isToday = (date === todayStr);
    var stocks = (historyData[date] || []).slice().sort(function(a, b) {
      return calcStockScore(b) - calcStockScore(a);
    });
    var stockCodes = stocks.map(function(s) { return s.code; });

    var newStocks = stocks.filter(function(s) { return !prevStocks.some(function(p) { return p.code === s.code; }); });
    var exitStocks = prevStocks.filter(function(p) { return stockCodes.indexOf(p.code) < 0; });

    html += '<div class="timeline-item' + (isToday ? ' today' : '') + '" onclick="clickTimelineDate(\'' + date + '\')">';
    html += '<div class="timeline-date">' + date + '（' + stocks.length + '只）</div>';
    if (isToday) { html += '<div style="font-size:11px;color:#5ec3ff;margin-bottom:6px;font-weight:600;">📌 今日最新</div>'; }
    html += '<div class="timeline-content">';

    var currentList = stocks.map(function(s) {
      return s.name + ' <span style="color:#999;font-size:11px;">(' + calcStockScore(s) + '分)</span>';
    }).join('、');
    html += '<div style="margin-bottom:8px;font-size:' + (isToday ? '15px' : '13px') + ';color:#5ec3ff;font-weight:' + (isToday ? '600' : '500') + ';line-height:1.6;">📍 当前：' + currentList + '</div>';

    if (newStocks.length > 0) {
      html += '<div style="color:#c62828;margin-bottom:4px;font-size:' + (isToday ? '13px' : '12px') + ';font-weight:' + (isToday ? '600' : '400') + ';padding-left:4px;">➕ 新增：' + newStocks.map(function(s) { return s.name; }).join('、') + '</div>';
    }

    if (exitStocks.length > 0) {
      html += '<div style="color:#2e7d32;margin-bottom:4px;font-size:' + (isToday ? '13px' : '12px') + ';font-weight:' + (isToday ? '600' : '400') + ';padding-left:4px;">➖ 退出：' + exitStocks.map(function(s) { return s.name; }).join('、') + '</div>';
    }

    if (newStocks.length === 0 && exitStocks.length === 0 && prevStocks.length > 0) {
      html += '<div style="color:#999;font-size:12px;">→ 无变化</div>';
    }

    html += '</div></div>';

    prevStocks = stocks;
  });

  timelineContent.innerHTML = html;
}

// 渲染日历
function renderCalendar() {
  var container = document.getElementById('calendarContent');
  var emptyState = document.getElementById('emptyCalendar');

  var dates = Object.keys(historyData).sort();

  if (dates.length === 0) {
    container.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }

  var stockDays = {};
  dates.forEach(function(date) {
    (historyData[date] || []).forEach(function(s) {
      if (!stockDays[s.code]) {
        stockDays[s.code] = { name: s.name, code: s.code, dates: [], pctMap: {} };
      }
      stockDays[s.code].dates.push(date);
      stockDays[s.code].pctMap[date] = s.pct_chg;
    });
  });

  var persistentStocks = [];
  for (var key in stockDays) {
    if (stockDays[key].dates.length >= 2) {
      persistentStocks.push(stockDays[key]);
    }
  }

  if (persistentStocks.length === 0) {
    container.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }

  persistentStocks.sort(function(a, b) { return b.dates.length - a.dates.length; });

  var html = '<table class="calendar-table">';
  html += '<thead><tr><th style="min-width:120px;">股票</th>';
  dates.forEach(function(date) {
    html += '<th>' + date.slice(5) + '</th>';
  });
  html += '</tr></thead><tbody>';

  persistentStocks.forEach(function(stock) {
    html += '<tr class="stock-row">';
    html += '<td class="stock-name">' + stock.name + '<br><span style="font-size:10px;color:#999;">' + stock.code + '</span></td>';
    dates.forEach(function(date) {
      var hasSignal = stock.dates.indexOf(date) >= 0;
      var pct = stock.pctMap[date];
      if (hasSignal && pct !== undefined) {
        var color = pct >= 0 ? '#c62828' : '#2e7d32';
        var sign = pct >= 0 ? '+' : '';
        html += '<td><span class="has-signal"></span><br><span style="font-size:9px;color:' + color + ';white-space:nowrap;">' + sign + pct.toFixed(2) + '%</span></td>';
      } else if (hasSignal) {
        html += '<td><span class="has-signal"></span></td>';
      } else {
        html += '<td></td>';
      }
    });
    html += '</tr>';
  });

  html += '</tbody></table>';
  container.innerHTML = html;
  emptyState.style.display = 'none';
}

// 更新统计栏
function updateStats() {
  var data = historyData[currentDate] || [];
  var dates = Object.keys(historyData).sort();
  var currentIndex = dates.indexOf(currentDate);

  document.getElementById('statCount').textContent = data.length;

  if (currentIndex > 0) {
    var prevData = historyData[dates[currentIndex - 1]] || [];
    var prevCodes = prevData.map(function(s) { return s.code; });
    var currentCodes = data.map(function(s) { return s.code; });

    var newCount = data.filter(function(s) { return prevCodes.indexOf(s.code) < 0; }).length;
    var exitCount = prevData.filter(function(s) { return currentCodes.indexOf(s.code) < 0; }).length;

    document.getElementById('statNew').textContent = '+' + newCount;
    document.getElementById('statExit').textContent = '-' + exitCount;
  } else {
    document.getElementById('statNew').textContent = data.length;
    document.getElementById('statExit').textContent = '-';
  }

  if (data.length > 0) {
    var avgDays = Math.round(data.reduce(function(sum, s) { return sum + (s.duration_days || 0); }, 0) / data.length);
    document.getElementById('statAvgDays').textContent = avgDays + '天';
  } else {
    document.getElementById('statAvgDays').textContent = '-';
  }
}

// 切换标签页
function switchTab(tab, e) {
  currentTab = tab;

  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) { tabs[i].classList.remove('active'); }
  if (e && e.target) e.target.classList.add('active');

  var tabContents = document.querySelectorAll('.tab-content');
  for (var i = 0; i < tabContents.length; i++) { tabContents[i].style.display = 'none'; }
  var tabId = tab === 'calendar' ? 'tabCalendar' : 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
  document.getElementById(tabId).style.display = 'block';

  updateCurrentTab();
}

// 跳转日期
function jumpToDate(days) {
  var current = new Date(currentDate);
  current.setDate(current.getDate() + days);

  var newDate = current.toISOString().split('T')[0];
  var minDate = '2026-06-01';
  var maxDate = new Date().toISOString().split('T')[0];

  if (newDate >= minDate && newDate <= maxDate) {
    document.getElementById('dateSelector').value = newDate;
    loadData();
  }
}

// 跳转到今天
function jumpToToday() {
  var today = new Date().toISOString().split('T')[0];
  document.getElementById('dateSelector').value = today;
  loadData();
}
</script>
